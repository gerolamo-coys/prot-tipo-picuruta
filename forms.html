<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Inscrição - Escola de Surf Picuruta Salazar</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f6bc43; /* vermelho */
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 40px auto;
      background: #75cedf; /* amarelo */
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }

    .logo {
      display: block;
      margin: 0 auto 20px;
      max-width: 120px;
    }

    h1 {
      text-align: center;
      color: #000;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
      color: #000;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 2px solid #000;
      border-radius: 6px;
      outline: none;
    }

    input:focus {
      border-color: #f6bc43;
      background-color: #fff8cc;
    }

    .upload {
      background: #fff;
      padding: 10px;
      border-radius: 6px;
      border: 2px dashed #000;
      margin-top: 5px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      background-color: #000;
      color: #f6bc43;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background-color: #333;
    }
  </style>
</head>

<body>

  <div class="container">
    <a href="index.html"><img src="images/logo.svg" alt="Logo" class="logo"></a>

    <h1>Ficha de Inscrição</h1>

    <form>
      <label>Nome Completo:</label>
      <input type="text" required>

      <label>Número de Telefone:</label>
      <input type="tel" required>

      <label>Endereço:</label>
      <input type="text" required>

      <label>E-mail:</label>
      <input type="email" required>

      <label>CPF:</label>
      <input type="text" required>

      <label>RG:</label>
      <input type="text" required>

      <label>Comprovante de RG:</label>
      <input type="file" class="upload" required>

      <label>Comprovante de CPF:</label>
      <input type="file" class="upload" required>

      <label>Comprovante de Residência:</label>
      <input type="file" class="upload" required>

      <button type="submit">Enviar Inscrição</button>
    </form>
  </div>

</body>
</html>
